name: velona_ai
description: "Velona AI - YouTube Shorts 자동 생성 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3

  # Firebase / 인증
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  google_sign_in: ^6.2.1

  # 라우팅
  go_router: ^14.2.0

  # 영상 재생
  video_player: ^2.8.6
  chewie: ^1.8.1

  # 이미지 캐싱
  cached_network_image: ^3.3.1

  # 로컬 저장소
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # WebView (슬라이드 미리보기)
  webview_flutter: ^4.8.0

  # 오디오 (TTS 미리 듣기)
  just_audio: ^0.9.40

  # 공유
  share_plus: ^9.0.0

  # 로딩 UI
  shimmer: ^3.0.0

  # 파일/경로
  path_provider: ^2.1.3

  # 권한
  permission_handler: ^11.3.1

  # 네트워크 상태
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0d0f13"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

flutter_native_splash:
  color: "#0d0f13"
  image: assets/images/app_icon.png
  android_12:
    color: "#0d0f13"
    image: assets/images/app_icon.png
